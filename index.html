<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="V.E.G.A.">
<meta name="description" content="V.E.G.A. — Voice-Enabled General Assistant">
<meta name="theme-color" content="#05020f">
<title>V.E.G.A.</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --p: #b388ff; --p2: rgba(179,136,255,0.2); --p3: rgba(179,136,255,0.08);
  --bg: #05020f; --dim: #3d2466; --mid: #7c52c8; --border: rgba(179,136,255,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; width: 100%; background: var(--bg); color: var(--p); font-family: 'Share Tech Mono', monospace; overflow: hidden; position: fixed; top: 0; left: 0; }
#bg-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
#app { position: relative; z-index: 2; height: 100%; width: 100%; max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; padding: 32px 32px 24px; }
#header { width: 100%; display: flex; align-items: flex-start; justify-content: space-between; padding-bottom: 12px; border-bottom: 0.5px solid var(--border); margin-bottom: 16px; flex-shrink: 0; }
#vname { font-family: 'Orbitron', monospace; font-size: 26px; font-weight: 700; letter-spacing: .35em; color: var(--p); }
#vsub { font-size: 10px; letter-spacing: .2em; color: var(--dim); margin-top: 4px; }
#header-right { text-align: right; }
#clock { font-size: 18px; color: var(--p); }
#status-row { display: flex; align-items: center; justify-content: flex-end; gap: 5px; margin-top: 3px; }
.sdot { width: 5px; height: 5px; border-radius: 50%; background: var(--p); animation: gp 2s ease-in-out infinite; }
#slbl { font-size: 10px; letter-spacing: .18em; color: var(--dim); }
#vis-wrap { position: relative; width: min(380px, 50vw); height: min(380px, 50vw); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin: 16px 0 14px; }
#vis-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
#core-btn { position: relative; z-index: 2; width: 96px; height: 96px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 50%; background: none; border: none; outline: none; -webkit-tap-highlight-color: transparent; user-select: none; transition: transform .15s; }
  #core-btn:hover { transform: scale(1.05); }
#core-ring { position: absolute; inset: 0; border-radius: 50%; border: 1.5px solid rgba(179,136,255,0.45); transition: border-color .3s; pointer-events: none; }
#core-bg { position: absolute; inset: 7px; border-radius: 50%; background: rgba(179,136,255,0.07); border: 1px solid rgba(179,136,255,0.25); transition: background .3s; pointer-events: none; }
.speaking #core-ring { border-color: rgba(179,136,255,0.95); }
.speaking #core-bg { background: rgba(179,136,255,0.18); }
.listening #core-ring { border-color: rgba(100,220,255,0.9); }
.listening #core-bg { background: rgba(100,220,255,0.12); }
.thinking #core-ring { border-color: rgba(140,100,230,0.7); }
#mic-svg { width: 28px; height: 28px; pointer-events: none; transition: opacity .25s; }
#core-dot { position: absolute; width: 26px; height: 26px; border-radius: 50%; background: var(--p); animation: gp 1.5s ease-in-out infinite; pointer-events: none; opacity: 0; transition: opacity .25s; }
#state-lbl { font-size: 11px; letter-spacing: .25em; color: var(--dim); margin-bottom: 8px; text-align: center; flex-shrink: 0; height: 16px; transition: color .3s; }
#agent-badge { font-size: 10px; letter-spacing: .18em; color: var(--dim); margin-bottom: 6px; text-align: center; flex-shrink: 0; height: 14px; }
#resp-area { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; padding: 8px 4px; min-height: 60px; overflow: hidden; }
#resp-txt { font-size: 15px; line-height: 1.8; text-align: center; color: rgba(179,136,255,0.35); font-style: italic; transition: color .4s; max-height: 220px; overflow-y: auto; padding: 0 16px; }
#resp-txt.active { color: var(--p); font-style: normal; }
#more-btn { background: transparent; border: 0.5px solid rgba(179,136,255,0.15); border-radius: 22px; padding: 8px 24px; color: var(--dim); font-family: 'Share Tech Mono',monospace; font-size: 10px; letter-spacing: .2em; cursor: pointer; margin-bottom: 14px; flex-shrink: 0; transition: border-color .2s, color .2s; }
  #more-btn:hover { border-color: var(--p2); color: var(--mid); }
#drawer { width: 100%; border-radius: 16px; overflow: hidden; max-height: 0; transition: max-height .35s cubic-bezier(.4,0,.2,1); background: rgba(0,0,0,0.55); border: 0.5px solid transparent; flex-shrink: 0; }
#drawer.open { max-height: 240px; border-color: var(--border); }
#drawer-inner { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.qrow { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.qb { background: var(--p3); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 10px; text-align: center; color: var(--p); font-family: 'Share Tech Mono',monospace; font-size: 11px; letter-spacing: .12em; cursor: pointer; transition: background .15s, border-color .15s; }
  .qb:hover { background: rgba(179,136,255,0.15); border-color: var(--p2); }
#tinput-row { display: flex; gap: 7px; }
#tinput { flex: 1; height: 44px; background: var(--p3); border: 0.5px solid rgba(179,136,255,0.22); border-radius: 10px; padding: 0 14px; color: var(--p); font-family: 'Share Tech Mono',monospace; font-size: 13px; outline: none; }
#tinput::placeholder { color: #2d1a4d; }
#tsend { width: 44px; height: 44px; border-radius: 10px; background: rgba(179,136,255,0.15); border: 0.5px solid rgba(179,136,255,0.4); color: var(--p); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
@keyframes gp { 0%,100%{opacity:.45} 50%{opacity:1} }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="app">
  <div id="header">
    <div><div id="vname">V.E.G.A.</div><div id="vsub">VOICE-ENABLED GENERAL ASSISTANT</div></div>
    <div id="header-right">
      <div id="clock">--:--:--</div>
      <div id="status-row"><span class="sdot"></span><span id="slbl">ONLINE</span></div>
    </div>
  </div>

  <div id="vis-wrap">
    <canvas id="vis-canvas"></canvas>
    <button id="core-btn" aria-label="Tap to speak">
      <div id="core-ring"></div>
      <div id="core-bg"></div>
      <svg id="mic-svg" viewBox="0 0 24 24" fill="none">
        <rect x="9" y="2" width="6" height="11" rx="3" fill="rgba(179,136,255,0.85)"/>
        <path d="M5 11a7 7 0 0014 0" stroke="#b388ff" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <line x1="12" y1="18" x2="12" y2="22" stroke="#b388ff" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="9" y1="22" x2="15" y2="22" stroke="#b388ff" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div id="core-dot"></div>
    </button>
  </div>

  <div id="state-lbl">TAP TO SPEAK</div>
  <div id="agent-badge"></div>

  <div id="resp-area"><div id="resp-txt">Awaiting your command.</div></div>

  <button id="more-btn">▾ MORE OPTIONS</button>
  <div id="drawer">
    <div id="drawer-inner">
      <div class="qrow">
        <div class="qb" data-cmd="What are my active projects?">◈ PROJECTS</div>
        <div class="qb" data-cmd="Check the latest trending AI news">◈ NEWS FEED</div>
        <div class="qb" data-cmd="Draft an Instagram post about AI movies">◈ INSTAGRAM</div>
        <div class="qb" data-cmd="Give me a full system status report">◈ STATUS</div>
      </div>
      <div id="tinput-row">
        <input id="tinput" type="text" placeholder="TYPE A COMMAND..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
        <button id="tsend">▶</button>
      </div>
    </div>
  </div>
</div>

<script>
const BACKEND_URL = "https://vega-backend-production-b752.up.railway.app";
let history    = [];
let mode       = 'idle';
let drawerOpen = false;
let mediaRecorder = null;
let audioChunks   = [];
let wakeRecognition = null;
let wakeActive = false;
let ampData = new Float32Array(72).fill(0);
let targetAmp = new Float32Array(72).fill(0);
let rotAngle = 0;
let thinkPhase = 0;
const NUM_BARS = 72;

// ── CLOCK ────────────────────────────────────────────────
setInterval(()=>{ document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8); }, 1000);

// ── STARS ────────────────────────────────────────────────
(function(){
  const c = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){
    c.width=window.innerWidth; c.height=window.innerHeight;
    stars=Array.from({length:120},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()<.1?1.4:.65,a:Math.random()*.7+.1,sp:Math.random()*.003+.002,ph:Math.random()*Math.PI*2}));
  }
  function draw(t){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      const al=(Math.sin(t*.001*s.sp*300+s.ph)+1)/2*s.a;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${al.toFixed(2)})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); window.addEventListener('resize',resize); requestAnimationFrame(draw);
})();

// ── VISUALIZER ───────────────────────────────────────────
const vc=document.getElementById('vis-canvas');
const vctx=vc.getContext('2d');
function resizeVis(){ const w=document.getElementById('vis-wrap').offsetWidth; vc.width=w; vc.height=w; }
window.addEventListener('resize',resizeVis); setTimeout(resizeVis,100);

function getColor(){
  if(mode==='listening') return {line:'rgba(100,220,255,',glow:'rgba(100,220,255,0.25)'};
  if(mode==='speaking')  return {line:'rgba(179,136,255,',glow:'rgba(179,136,255,0.3)'};
  if(mode==='thinking')  return {line:'rgba(130,90,220,', glow:'rgba(130,90,220,0.2)'};
  return {line:'rgba(70,44,120,',glow:'rgba(70,44,120,0.1)'};
}

function drawVis(ts){
  requestAnimationFrame(drawVis);
  const W=vc.width,H=vc.height,CX=W/2,CY=H/2;
  const RI=W*.19,RM=W*.38,RO=W*.46;
  vctx.clearRect(0,0,W,H);
  const col=getColor();
  const avg=Array.from(ampData).reduce((a,b)=>a+b,0)/NUM_BARS;
  const gr=vctx.createRadialGradient(CX,CY,RI,CX,CY,RO+avg*W*.06);
  gr.addColorStop(0,'transparent');gr.addColorStop(.6,col.glow);gr.addColorStop(1,'transparent');
  vctx.beginPath();vctx.arc(CX,CY,RO+avg*W*.06,0,Math.PI*2);vctx.fillStyle=gr;vctx.fill();
  [[RO,.1],[RM,.07],[RI+W*.02,.14]].forEach(([r,a])=>{
    vctx.beginPath();vctx.arc(CX,CY,r,0,Math.PI*2);
    vctx.strokeStyle=`rgba(179,136,255,${a})`;vctx.lineWidth=.8;vctx.stroke();
  });
  if(mode==='thinking'){
    thinkPhase+=.05;
    for(let i=0;i<3;i++){
      const a=thinkPhase+(i*Math.PI*2/3),r=RI+W*.1;
      vctx.beginPath();vctx.arc(CX+Math.cos(a)*r,CY+Math.sin(a)*r,3.5,0,Math.PI*2);
      vctx.fillStyle=`rgba(140,100,230,${(.4+Math.sin(thinkPhase*2+i)*.35).toFixed(2)})`;vctx.fill();
    }
  }
  if(mode==='speaking'){
    for(let i=0;i<NUM_BARS;i++) targetAmp[i]=Math.abs(Math.sin(ts*.002*(1+i*.025)+i*.38))*(0.25+Math.random()*.55);
  } else {
    for(let i=0;i<NUM_BARS;i++) targetAmp[i]=.03+Math.sin(ts*.0008+i*.28)*.02;
  }
  for(let i=0;i<NUM_BARS;i++) ampData[i]+=(targetAmp[i]-ampData[i])*.16;
  rotAngle+=mode==='speaking'?.009:.003;
  for(let i=0;i<NUM_BARS;i++){
    const a=(i/NUM_BARS)*Math.PI*2+rotAngle,amp=ampData[i],bH=amp*RM*.85+2;
    const x1=CX+Math.cos(a)*(RI+2),y1=CY+Math.sin(a)*(RI+2);
    const x2=CX+Math.cos(a)*(RI+2+bH),y2=CY+Math.sin(a)*(RI+2+bH);
    vctx.beginPath();vctx.moveTo(x1,y1);vctx.lineTo(x2,y2);
    vctx.strokeStyle=col.line+((.35+amp*.65).toFixed(2))+')';
    vctx.lineWidth=mode==='speaking'?2.2:1.6;vctx.lineCap='round';vctx.stroke();
  }
}
requestAnimationFrame(drawVis);

// ── MODE ─────────────────────────────────────────────────
function setMode(m){
  mode=m;
  const btn=document.getElementById('core-btn');
  btn.className=m;
  const lbl=document.getElementById('state-lbl');
  const slbl=document.getElementById('slbl');
  const dot=document.getElementById('core-dot');
  const mic=document.getElementById('mic-svg');
  const map={
    idle:     ['SAY "HEY VEGA" OR TAP', '#3d2466','READY'],
    listening:['SPEAK NOW',             '#64dcff','LISTENING'],
    thinking: ['PROCESSING...',         '#7c52c8','THINKING'],
    speaking: ['V.E.G.A. SPEAKING',    '#b388ff','SPEAKING']
  };
  const [txt,col,st]=map[m]||map.idle;
  lbl.textContent=txt; lbl.style.color=col; slbl.textContent=st;
  dot.style.opacity = m==='speaking' ? '1' : '0';
  mic.style.opacity = m==='speaking' ? '0' : '1';
}

function showResp(text,active){
  const el=document.getElementById('resp-txt');
  el.textContent=text;
  el.classList.toggle('active',!!active);
}

function setAgent(txt){
  document.getElementById('agent-badge').textContent=txt?'[ '+txt+' ]':'';
}

// ── MEDIARECORDER VOICE ───────────────────────────────────
const SILENCE_THRESHOLD = 8;   // audio level below this = silence
const SILENCE_TIMEOUT   = 2000; // ms of silence before auto-send
const MAX_RECORD_TIME   = 12000; // max recording ms before force-send

function getSupportedMimeType(){
  const types=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4',''];
  for(const t of types){ if(!t || MediaRecorder.isTypeSupported(t)) return t; }
  return '';
}

async function startRecording(){
  stopWakeWord();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioChunks = [];

    // ── Silence detection via AudioContext analyser ──
    const audioCtx   = new (window.AudioContext||window.webkitAudioContext)();
    const source     = audioCtx.createMediaStreamSource(stream);
    const analyser   = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);
    const dataArray  = new Uint8Array(analyser.frequencyBinCount);

    let silenceStart  = null;
    let hasSpoken     = false;
    let silenceTimer  = null;
    let maxTimer      = null;
    let watching      = true;

    const recordStart = Date.now();
    const MIN_RECORD_MS = 800;
    let maxLevel = 0;

    function checkSilence(){
      if(!watching) return;
      analyser.getByteFrequencyData(dataArray);
      const avg = dataArray.reduce((a,b)=>a+b,0) / dataArray.length;
      if(avg > maxLevel) maxLevel = avg;

      document.getElementById('agent-badge').textContent = 'level ' + Math.round(avg) + ' • peak ' + Math.round(maxLevel);

      if(avg > SILENCE_THRESHOLD){
        hasSpoken    = true;
        silenceStart = null;
        updateSilenceBar(avg);
      } else if(hasSpoken && (Date.now() - recordStart) > MIN_RECORD_MS){
        if(!silenceStart) silenceStart = Date.now();
        const silentFor = Date.now() - silenceStart;
        const pct = Math.min(100, Math.round(silentFor / SILENCE_TIMEOUT * 100));
        updateSilenceBar(0, pct);
        if(silentFor >= SILENCE_TIMEOUT){
          watching = false;
          autoStopRecording(stream, audioCtx);
          return;
        }
      }
      requestAnimationFrame(checkSilence);
    }

    // Max recording safety cutoff
    maxTimer = setTimeout(()=>{
      if(watching){ watching=false; autoStopRecording(stream, audioCtx); }
    }, MAX_RECORD_TIME);

    const mimeType = getSupportedMimeType();
    mediaRecorder = mimeType
      ? new MediaRecorder(stream, {mimeType})
      : new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if(e.data && e.data.size>0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      clearTimeout(maxTimer);
      stream.getTracks().forEach(t=>t.stop());
      audioCtx.close().catch(()=>{});
      hideSilenceBar();
      transcribeAudio();
    };
    mediaRecorder.start(100);
    setMode('listening');
    showResp('Listening...', false);
    requestAnimationFrame(checkSilence);

  } catch(e) {
    setMode('idle');
    showResp('Mic error: '+e.message, false);
    setTimeout(startWakeWord, 1000);
  }
}

function autoStopRecording(stream, audioCtx){
  if(mediaRecorder && mediaRecorder.state!=='inactive'){
    setMode('thinking');
    showResp('Processing...', false);
    mediaRecorder.stop();
  }
}

function stopRecording(){
  if(mediaRecorder && mediaRecorder.state!=='inactive'){
    setMode('thinking');
    showResp('Processing...', false);
    mediaRecorder.stop();
  }
}

// ── SILENCE BAR UI ───────────────────────────────────────
function updateSilenceBar(level, silencePct){
  let bar = document.getElementById('silence-bar');
  if(!bar){
    bar = document.createElement('div');
    bar.id = 'silence-bar';
    bar.style.cssText = 'position:absolute;bottom:0;left:0;height:3px;border-radius:2px;transition:width .1s;background:#64dcff;width:0%;';
    document.getElementById('vis-wrap').style.position='relative';
    document.getElementById('vis-wrap').appendChild(bar);
  }
  if(silencePct !== undefined){
    bar.style.background = '#b388ff';
    bar.style.width = (100 - silencePct) + '%';
  } else {
    bar.style.background = '#64dcff';
    bar.style.width = Math.min(100, level * 1.5) + '%';
  }
}

function hideSilenceBar(){
  const bar = document.getElementById('silence-bar');
  if(bar) bar.style.width = '0%';
}

async function transcribeAudio(){
  try {
    if(!audioChunks.length){ setMode('idle'); showResp('No audio captured — try again.',false); return; }

    const mimeType = mediaRecorder.mimeType || 'audio/webm';
    const blob = new Blob(audioChunks, {type: mimeType});
    showResp('Captured '+Math.round(blob.size/1024)+'kb — transcribing...', false);

    const base64 = await blobToBase64(blob);

    const res = await fetch(BACKEND_URL + '/transcribe', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ audio: base64, mimeType: mimeType })
    });
    const data = await res.json();

    if(data.detail || data.error){
      setMode('idle');
      showResp('STT error: '+(data.detail || data.error), false);
      return;
    }

    const transcript = data?.transcript?.trim();
    if(transcript && transcript.length > 0){
      showResp(transcript, false);
      callVega(transcript);
    } else {
      setMode('idle');
      showResp('No speech detected — tap mic and try again.', false);
    }
  } catch(e) {
    setMode('idle');
    showResp('Transcription error: '+e.message, false);
    console.error(e);
  }
}

function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onloadend=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
    reader.readAsDataURL(blob);
  });
}

// ── WAKE WORD ────────────────────────────────────────────
function startWakeWord(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR || wakeActive) return;

  wakeRecognition = new SR();
  wakeRecognition.lang = 'en-US';
  wakeRecognition.continuous = true;
  wakeRecognition.interimResults = true;
  wakeRecognition.maxAlternatives = 1;

  wakeRecognition.onstart = () => {
    wakeActive = true;
    document.getElementById('slbl').textContent = 'LISTENING';
  };

  wakeRecognition.onresult = e => {
    const heard = Array.from(e.results)
      .map(r => r[0].transcript.toLowerCase())
      .join(' ')
      .trim();

    // Visual feedback: dim hint of what's being heard
    if(heard) document.getElementById('state-lbl').textContent = '… ' + heard.slice(-40);

    // Wake-word matching — broad and forgiving
    const wakeWords = [
      'hey vega', 'hey vegas', 'hey vegan', 'hey baga', 'hey beggar',
      'hey mega', 'hey beg', 'hey vegga', 'hey vita', 'hey veiga',
      'a vega', 'aveda', 'avega', 'okay vega',
      'vega', 'mega', 'baga', 'vegan'
    ];

    const matched = wakeWords.some(w => heard.includes(w));

    if(matched){
      console.log('Wake word matched in:', heard);
      try { wakeRecognition.stop(); } catch(_){}
      wakeActive = false;
      pulseWake();
      setTimeout(()=> startRecording(), 600);
    }
  };

  wakeRecognition.onend = () => {
    wakeActive = false;
    document.getElementById('slbl').textContent = 'ONLINE';
    if(mode === 'idle'){
      setTimeout(startWakeWord, 1000);
    }
  };

  wakeRecognition.onerror = e => {
    wakeActive = false;
    if(e.error !== 'no-speech' && e.error !== 'aborted'){
      console.log('Wake word error:', e.error);
    }
    if(mode === 'idle'){
      setTimeout(startWakeWord, 2000);
    }
  };

  try { wakeRecognition.start(); } catch(e) { wakeActive = false; }
}

function stopWakeWord(){
  if(wakeRecognition){
    try { wakeRecognition.stop(); } catch(e){}
  }
  wakeActive = false;
}

function pulseWake(){
  const ring = document.getElementById('core-ring');
  const bg = document.getElementById('core-bg');
  ring.style.borderColor = 'rgba(100,220,255,0.95)';
  bg.style.background = 'rgba(100,220,255,0.2)';
  showResp('Ready...', false);
  setTimeout(()=>{
    ring.style.borderColor = '';
    bg.style.background = '';
  }, 800);

  // Speak acknowledgement before recording starts
  speakAck('Ready');
}

function speakAck(text){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 1.0;
  utt.pitch = 0.86;
  utt.volume = 1;
  const voices = speechSynthesis.getVoices();
  const pref = voices.find(v=>v.lang==='en-GB'&&/male/i.test(v.name))
    || voices.find(v=>v.lang==='en-GB')
    || voices.find(v=>/daniel|george|oliver/i.test(v.name))
    || voices.find(v=>v.lang.startsWith('en'));
  if(pref) utt.voice = pref;
  speechSynthesis.speak(utt);
}

// Start wake word as soon as page loads
window.addEventListener('load', ()=> setTimeout(startWakeWord, 1500));

// ── MIC BUTTON ───────────────────────────────────────────
document.getElementById('core-btn').addEventListener('click', function(){
  if(mode==='speaking'){ speechSynthesis.cancel(); setMode('idle'); return; }
  if(mode==='thinking') return;
  if(mode==='listening'){ stopRecording(); return; }
  startRecording();
});

// ── CALL BACKEND ─────────────────────────────────────────
async function callVega(text){
  setMode('thinking');
  setAgent('ORCHESTRATOR');
  history.push({role:'user',content:text});
  if(history.length>20) history=history.slice(-20);
  try {
    const res=await fetch(BACKEND_URL+'/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text, history:history.slice(0,-1)})
    });
    if(!res.ok) throw new Error('Server '+res.status);
    const data=await res.json();
    const reply=data.reply||'Signal lost.';
    history.push({role:'assistant',content:reply});
    showResp(reply,true);
    setAgent('');
    speakReply(reply);
  } catch(e) {
    setMode('idle'); setAgent('');
    showResp('Communication array offline. Check Railway.', false);
    setTimeout(startWakeWord, 1000);
  }
}

// ── SPEECH SYNTHESIS (Google TTS) ────────────────────────
// Unlock audio context on first user tap
let audioUnlocked = false;
let pendingSpeech = null;

document.addEventListener('click', ()=>{
  if(!audioUnlocked){
    audioUnlocked = true;
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    ctx.resume().then(()=> ctx.close());
    if(pendingSpeech){ const t=pendingSpeech; pendingSpeech=null; speakReply(t); }
  }
}, {once: false});

async function speakReply(text){
  if(!audioUnlocked){ pendingSpeech=text; setMode('idle'); setTimeout(startWakeWord,1000); return; }
  setMode('speaking');
  try {
    const res = await fetch(BACKEND_URL + '/speak', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text: text })
    });
    const data = await res.json();
    if(data.detail || data.error){ throw new Error(data.detail || data.error); }
    const audio = new Audio('data:audio/mp3;base64,'+data.audio);
    audio.onended = ()=>{
      setMode('idle');
      document.getElementById('state-lbl').textContent = 'SAY "HEY VEGA" TO CONTINUE';
      setTimeout(()=>{ startWakeWord(); }, 800);
    };
    audio.onerror = ()=>{ setMode('idle'); setTimeout(startWakeWord, 1000); };
    await audio.play();
  } catch(e) {
    console.error('TTS error:', e);
    setMode('idle');
    setTimeout(startWakeWord, 1000);
  }
}

async function speakAck(text){
  if(!audioUnlocked) return;
  try {
    const res = await fetch(BACKEND_URL + '/speak', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ text: text })
    });
    const data = await res.json();
    if(data.audio){
      const audio = new Audio('data:audio/mp3;base64,'+data.audio);
      await audio.play();
    }
  } catch(e) { console.error('Ack TTS error:', e); }
}

document.querySelectorAll('.qb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(mode==='idle') callVega(btn.dataset.cmd);
  });
});

document.getElementById('tsend').addEventListener('click',textSend);
document.getElementById('tinput').addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();textSend();} });

function textSend(){
  const inp=document.getElementById('tinput');
  const t=inp.value.trim();
  if(!t||mode!=='idle') return;
  inp.value=''; callVega(t);
}

document.addEventListener('gesturestart',e=>e.preventDefault());
speechSynthesis?.getVoices();
if(window.speechSynthesis) speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
